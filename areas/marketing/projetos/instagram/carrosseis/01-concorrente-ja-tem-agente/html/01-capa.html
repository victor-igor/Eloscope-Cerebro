<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 01 — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #080808;
    overflow: hidden;
    position: relative;
    font-family: 'Inter', sans-serif;
  }

  /* dot-grid */
  .dot-grid {
    position: absolute; inset: 0; z-index: 1;
    background-image: radial-gradient(circle, rgba(0,212,255,0.055) 1px, transparent 1px);
    background-size: 38px 38px;
  }

  /* vignette */
  .vignette {
    position: absolute; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
  }

  /* frame lines */
  .line-top, .line-bottom {
    position: absolute; left: 0; right: 0; height: 1px; z-index: 20;
    background: linear-gradient(90deg, transparent 5%, rgba(0,212,255,0.6) 40%, rgba(217,70,239,0.6) 60%, transparent 95%);
  }
  .line-top { top: 0; }
  .line-bottom { bottom: 0; }

  /* corner brackets */
  .corner {
    position: absolute; z-index: 20;
    width: 26px; height: 26px;
    border-color: rgba(0,212,255,0.4);
    border-style: solid;
  }
  .corner-tl { top: 34px; left: 34px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 34px; right: 34px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 34px; left: 34px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 34px; right: 34px; border-width: 0 2px 2px 0; }

  /* header */
  .header {
    position: absolute; top: 52px; left: 56px; right: 56px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 20;
  }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-icon-img { width: 28px; height: 28px; object-fit: contain; }
  .brand-name {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
    color: rgba(240,255,254,0.92); letter-spacing: 0.15em; text-transform: uppercase;
  }
  .handle {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: rgba(0,212,255,0.65); letter-spacing: 0.1em;
  }

  /* page count */
  .page-count {
    position: absolute; bottom: 52px; right: 56px; z-index: 20;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: rgba(240,255,254,0.35); letter-spacing: 0.15em;
  }

  /* content */
  .content {
    position: absolute; inset: 0; z-index: 15;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 140px 56px 120px;
    text-align: center;
    gap: 0;
  }

  /* ícone container */
  .icon-wrap {
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 0 48px rgba(0,212,255,0.18);
  }
  .icon-svg {
    width: 64px; height: 64px;
    stroke: #00D4FF; fill: none; stroke-width: 1.5;
    filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
  }

  /* connector */
  .connector {
    width: 1px; height: 40px;
    background: linear-gradient(180deg, rgba(0,212,255,0.6) 0%, transparent 100%);
    margin-bottom: 32px;
  }

  /* headline */
  .hl-white {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 68px; line-height: 1.05;
    color: rgba(240,255,254,0.92);
    margin-bottom: 4px;
  }
  .hl-dim {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 68px; line-height: 1.05;
    color: rgba(240,255,254,0.45);
    margin-bottom: 4px;
  }
  .hl-cyan {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 68px; line-height: 1.05;
    color: #00D4FF;
    text-shadow: 0 0 40px rgba(0,212,255,0.4);
    margin-bottom: 32px;
  }

  /* sub */
  .sub {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: 20px; line-height: 1.55;
    color: rgba(240,255,254,0.50);
    max-width: 640px;
    margin-bottom: 48px;
  }

  /* pill */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(0,212,255,0.35);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: rgba(0,212,255,0.8); letter-spacing: 0.08em;
  }
</style>
</head>
<body>

  <div class="dot-grid"></div>
  <div class="vignette"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="header">
    <div class="brand-mark">
      <img class="brand-icon-img"
           src="../../../../../../areas/design/assets/logos/EloScope - Logo - transparente.png" alt="">
      <span class="brand-name">eloscope</span>
    </div>
    <div class="handle">@eloscope.ai</div>
  </div>

  <div class="content">
    <div class="icon-wrap">
      <svg class="icon-svg" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="18" stroke="#00D4FF" stroke-width="1.5" fill="none"/>
        <path d="M20 32 C20 20 44 20 44 32 C44 44 20 44 20 32Z" stroke="#00D4FF" stroke-width="1.5" fill="none"/>
        <circle cx="32" cy="32" r="4" fill="#00D4FF" opacity="0.8"/>
        <line x1="32" y1="10" x2="32" y2="18" stroke="#00D4FF" stroke-width="1.5"/>
        <line x1="32" y1="46" x2="32" y2="54" stroke="#00D4FF" stroke-width="1.5"/>
        <line x1="10" y1="32" x2="18" y2="32" stroke="#00D4FF" stroke-width="1.5"/>
        <line x1="46" y1="32" x2="54" y2="32" stroke="#00D4FF" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="connector"></div>

    <div class="hl-white">Sua empresa está</div>
    <div class="hl-dim">pronta para implementar</div>
    <div class="hl-cyan">agentes de IA?</div>

    <p class="sub">Essa pergunta tem uma resposta<br>mais simples do que parece.</p>

    <div class="pill">arraste para o lado →</div>
  </div>

  <div class="page-count">01 / 06</div>

</body>
</html>
