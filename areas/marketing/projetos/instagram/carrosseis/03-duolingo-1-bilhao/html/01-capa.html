<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Eloscope — Carrossel 03 — Capa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .slide {
    position: relative;
    width: 1080px;
    height: 1350px;
    background: #050505;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ── CAMADA 1: dot-grid ── */
  .dot-grid {
    position: absolute; inset: 0; z-index: 1;
    background-image: radial-gradient(circle, rgba(0,212,255,0.022) 1px, transparent 1px);
    background-size: 38px 38px;
  }

  /* ── CAMADA 2: aurora cyan atmosférica (Eloscope brand) ── */
  .aurora {
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 1100px; height: 950px;
    background:
      radial-gradient(ellipse at 38% 45%, rgba(0,212,255,0.14) 0%, transparent 48%),
      radial-gradient(ellipse at 65% 55%, rgba(0,212,255,0.08) 0%, transparent 42%),
      radial-gradient(ellipse at 50% 20%, rgba(217,70,239,0.06) 0%, transparent 55%);
    filter: blur(48px);
    z-index: 2; pointer-events: none;
  }

  /* ── CAMADA 3: glow ring cyan atrás da coruja ── */
  .hero-glow {
    position: absolute;
    top: 60px; left: 50%; transform: translateX(-50%);
    width: 680px; height: 680px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.18) 0%, rgba(0,212,255,0.05) 45%, transparent 68%);
    filter: blur(32px);
    z-index: 3; pointer-events: none;
  }

  /* ── CAMADA 4: imagem da coruja cyan (blend: screen remove o preto) ── */
  .hero-img {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 820px;
    z-index: 4;
    overflow: hidden;
    mix-blend-mode: screen;
  }
  .hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    filter: brightness(1.0) contrast(1.05);
  }

  /* ── CAMADA 5: chão glow cyan sob a coruja ── */
  .floor-glow {
    position: absolute;
    top: 680px; left: 50%; transform: translateX(-50%);
    width: 560px; height: 100px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.22) 0%, transparent 70%);
    filter: blur(22px);
    z-index: 5; pointer-events: none;
  }

  /* ── CAMADA 6: gradiente fade hero → dark ── */
  .hero-fade {
    position: absolute;
    top: 500px; left: 0; right: 0;
    height: 460px;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(5,5,5,0.50) 28%,
      rgba(5,5,5,0.85) 55%,
      #050505 72%
    );
    z-index: 6; pointer-events: none;
  }

  /* Cyan glow sutil na zona de texto */
  .text-glow {
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 900px; height: 500px;
    background: radial-gradient(ellipse at bottom, rgba(0,212,255,0.07) 0%, transparent 60%);
    z-index: 7; pointer-events: none;
  }

  /* ── FRAME ── */
  .line-top, .line-bottom {
    position: absolute; left: 0; right: 0; height: 2px; z-index: 20;
  }
  .line-top    { top: 0;    background: linear-gradient(90deg, transparent 5%, rgba(0,212,255,0.70) 40%, rgba(217,70,239,0.60) 60%, transparent 95%); }
  .line-bottom { bottom: 0; background: linear-gradient(90deg, transparent 5%, rgba(0,212,255,0.50) 40%, rgba(217,70,239,0.40) 60%, transparent 95%); }

  .corner { position: absolute; width: 26px; height: 26px; z-index: 20; opacity: 0.40; }
  .corner-tl { top: 34px; left: 34px;   border-top: 1.5px solid #00D4FF; border-left:  1.5px solid #00D4FF; }
  .corner-tr { top: 34px; right: 34px;  border-top: 1.5px solid #00D4FF; border-right: 1.5px solid #00D4FF; }
  .corner-bl { bottom: 34px; left: 34px;  border-bottom: 1.5px solid #00D4FF; border-left:  1.5px solid #00D4FF; }
  .corner-br { bottom: 34px; right: 34px; border-bottom: 1.5px solid #00D4FF; border-right: 1.5px solid #00D4FF; }

  /* ── HEADER ── */
  .header {
    position: absolute; top: 52px; left: 56px; right: 56px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 20; isolation: isolate;
  }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-icon-img { height: 24px; width: auto; }
  .brand-name {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 17px; letter-spacing: 0.15em; color: #00D4FF;
    text-shadow: 0 0 20px rgba(0,212,255,0.50);
  }
  .handle { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(107,114,128,0.70); letter-spacing: 0.03em; }

  /* ── TEXTO CENTRALIZADO ── */
  .text-zone {
    position: absolute;
    bottom: 76px; left: 56px; right: 56px;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .headline { margin-bottom: 20px; line-height: 1.04; }
  .hl-line { font-family: 'Syne', sans-serif; font-weight: 800; display: block; }
  .hl-white {
    font-size: 54px; color: rgba(240,255,254,0.92); letter-spacing: -0.01em;
    text-shadow: 0 2px 30px rgba(0,0,0,0.8);
  }
  .hl-cyan {
    font-size: 92px; color: #00D4FF; letter-spacing: -0.02em;
    text-shadow:
      0 0 24px rgba(0,212,255,0.80),
      0 0 60px rgba(0,212,255,0.40),
      0 0 120px rgba(0,212,255,0.15),
      0 4px 40px rgba(0,0,0,0.60);
  }

  .sub {
    font-family: 'Inter', sans-serif; font-size: 23px; font-weight: 400;
    color: rgba(240,255,254,0.48); line-height: 1.5; margin-bottom: 44px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }

  .arraste-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: rgba(240,255,254,0.46); letter-spacing: 0.04em;
    border: 1px solid rgba(255,255,255,0.16); border-radius: 100px;
    padding: 12px 16px 12px 24px;
    display: inline-flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03);
  }
  .arraste-arrow {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.16);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .page-count {
    position: absolute; bottom: 52px; right: 56px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(0,212,255,0.22); letter-spacing: 0.1em; z-index: 20;
  }

  /* ── GHOST TEXT "US$1B" ── */
  .ghost-text {
    position: absolute;
    top: 80px; left: 50%; transform: translateX(-50%);
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 340px; letter-spacing: -0.04em;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(0,212,255,0.10);
    white-space: nowrap;
    z-index: 2; pointer-events: none;
    user-select: none;
  }

  /* ── STAT CARDS ── */
  .stat-card {
    position: absolute;
    background: rgba(5,5,5,0.72);
    border: 1px solid rgba(0,212,255,0.18);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    padding: 14px 18px;
    z-index: 14;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;
    color: rgba(0,212,255,0.55);
  }

  .stat-value {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 26px; color: #F0FFFE; line-height: 1;
    text-shadow: 0 0 20px rgba(0,212,255,0.30);
  }

  .stat-sub {
    font-family: 'Inter', sans-serif; font-size: 11px;
    color: rgba(240,255,254,0.38); margin-top: 2px;
  }

  .stat-icon {
    font-size: 14px; margin-bottom: 2px; opacity: 0.7;
  }

  /* card positions */
  .card-receita {
    top: 148px; left: 52px;
    width: 200px;
  }

  .card-usuarios {
    top: 180px; right: 52px;
    width: 196px;
  }

  .card-crescimento {
    top: 370px; left: 52px;
    width: 188px;
  }

  .card-flumin {
    top: 390px; right: 52px;
    width: 180px;
  }

  /* ── HIGHLIGHT "ninguém" ── */
  .highlight-cyan {
    color: #00D4FF;
    text-shadow: 0 0 16px rgba(0,212,255,0.60);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="dot-grid"></div>
  <div class="aurora"></div>
  <div class="hero-glow"></div>
  <div class="ghost-text">US$1B</div>

  <div class="hero-img">
    <img src="../assets/duolingo-owl-3d.png" alt="Duolingo owl">
  </div>

  <div class="floor-glow"></div>
  <div class="hero-fade"></div>
  <div class="text-glow"></div>

  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Stat Cards -->
  <div class="stat-card card-receita">
    <span class="stat-label">Receita Anual</span>
    <span class="stat-value">US$ 1B+</span>
  </div>

  <div class="stat-card card-usuarios">
    <span class="stat-label">Usuários Ativos</span>
    <span class="stat-value">+500M</span>
  </div>

  <div class="stat-card card-crescimento">
    <span class="stat-label">Crescimento</span>
    <span class="stat-value">Comercial</span>
    <span class="stat-sub">sem equipe de vendas</span>
  </div>

  <div class="stat-card card-flumin">
    <span class="stat-label">Flumin Ativos</span>
    <span class="stat-value">+500M</span>
    <span class="stat-sub">streak diário</span>
  </div>

  <div class="header">
    <div class="brand-mark">
      <img class="brand-icon-img" src="../../../../../../design/assets/logos/EloScope - Logo - transparente.png" alt="">
      <span class="brand-name">eloscope</span>
    </div>
    <div class="handle">@eloscope.ai</div>
  </div>

  <div class="text-zone">
    <div class="headline">
      <span class="hl-line hl-white">Como o Duolingo bateu</span>
      <span class="hl-line hl-cyan">US$ 1 bilhão</span>
    </div>

    <p class="sub">sem contratar <span class="highlight-cyan">ninguém.</span></p>

    <span class="arraste-pill">
      arraste para o lado
      <span class="arraste-arrow">→</span>
    </span>
  </div>

  <div class="page-count">01 / 06</div>

</div>
</body>
</html>
